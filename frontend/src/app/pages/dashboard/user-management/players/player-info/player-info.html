<p-breadcrumb [model]="breadcrumbItems()"  ></p-breadcrumb>
<div class="card">
    <div class="font-semibold text-xl mb-4">Player Information</div>
    <div class="card mb-8!">
        <div class="font-semibold text-xl mb-4">Recent Matches</div>
        <p-table [value]="matches()" [paginator]="true" [rows]="5" responsiveLayout="scroll">
            <ng-template #header>
                <tr>
                    <th>Opponent</th>
                    <th pSortableColumn="name">Winner <p-sortIcon field="name"></p-sortIcon></th>
                    <th pSortableColumn="price">Score <p-sortIcon field="price"></p-sortIcon></th>
                    <th>View</th>
                </tr>
            </ng-template>
            <ng-template #body let-match>
                <tr>
                    <td style="width: 35%; min-width: 7rem;">{{ match.name }}</td>
                    <td style="width: 15%;">
                        <button pButton pRipple type="button" icon="pi pi-search" class="p-button p-component p-button-text p-button-icon-only"></button>
                    </td>
                </tr>
            </ng-template>
        </p-table>
    </div>
</div>
