<div class="card">
    <div class="flex flex-col xl:flex-row xl:justify-between xl:items-center gap-8 pb-8 border-b border-surface-200 dark:border-surface-700">
        <div class="flex flex-col sm:flex-row items-start sm:items-center gap-6">
            <div class="w-24 h-24 md:w-28 md:h-28">
                <img src="./assets/player1.jpg" alt="Player 1" />
            </div>
            <div class="flex flex-col gap-4">
                <div>
                    <h2 class="text-3xl font-bold dark:text-surface-0 ">
                        {{player().name}}
                    </h2>
                    <div class="flex items-center gap-4">
                        <div class="flex items-center gap-2 text-surface-500 dark:text-surface-400 ">
                            <img [ngSrc]="'https://flagcdn.com/w40/' + player().nationality.toLowerCase() + '.png'"
                                 width="18"
                                 height="12"
                                 class="rounded-xs"
                                 alt="Player Nationality Flag"/>
                            <span class="text-sm ">{{player().nationality}}</span>
                        </div>
                        <span class="text-surface-300 dark:text-surface-200">•</span>
                        <p-tag [value]="player().status" [severity]="getStatusColor(player().status)"  />
                    </div>
                </div>
                <div class="flex flex-wrap gap-2">
                    <p-button
                        label="Add to Tournament"
                        icon="pi pi-plus"
                        severity="primary"
                        styleClass="text-xs font-semibold py-2 px-3.5">
                    </p-button>
                    <p-button
                        label="Suspend Player"
                        icon="pi pi-ban"
                        outlined
                        severity="danger"
                        styleClass="text-xs font-semibold py-2 px-3.5">
                    </p-button>
                </div>
            </div>
        </div>

        <div class="flex flex-col sm:flex-row items-start sm:items-center gap-6 xl:gap-8 bg-surface-50/40 dark:bg-surface-900/10 p-5 rounded-2xl border border-surface-100 dark:border-surface-800/60 w-full xl:w-auto">
            <div class="flex items-center gap-8 sm:gap-6 min-w-60 justify-between sm:justify-start">
                <div class="flex flex-col gap-0.5">
                    <span class="text-xs font-bold uppercase tracking-widest text-surface-400">Wins</span>
                    <span class="text-3xl font-black tracking-tight  text-green-400">24</span>
                </div>
                <div class="h-8 w-px bg-surface-200 dark:bg-surface-800 hidden sm:block"></div>

                <div class="flex flex-col gap-0.5">
                    <span class="text-xs font-bold uppercase tracking-widest text-surface-400">Losses</span>
                    <span class="text-3xl font-black tracking-tight text-red-400 ">8</span>
                </div>
                <div class="h-8 w-px bg-surface-200 dark:bg-surface-800 hidden sm:block"></div>

                <div class="flex flex-col gap-0.5">
                    <span class="text-xs font-bold uppercase tracking-widest text-surface-400 ">Void</span>
                    <span class="text-3xl font-black tracking-tight text-surface-400 dark:text-surface-500">1</span>
                </div>
            </div>

            <div class="flex flex-col gap-2 w-full sm:w-44 border-t sm:border-t-0 sm:border-l border-surface-200 dark:border-surface-800 pt-4 sm:pt-0 sm:pl-6">
                <div class="flex items-baseline justify-between">
                    <span class="text-xs font-bold uppercase tracking-widest text-surface-400">Win Rate</span>
                    <span class="text-xl font-black text-surface-900 dark:text-surface-0 tracking-tight">73.5%</span>
                </div>
                <div class="w-full h-1.5 bg-surface-200 dark:bg-surface-800 rounded-full overflow-hidden ">
                    <div class="h-full bg-primary rounded-full" style="width: 73.5%"></div>
                </div>
            </div>
        </div>
    </div>

    <div class="border-t border-surface-200 dark:border-surface-700 pt-6">
        <div class="grid grid-cols-12 gap-6">

            <div class="col-span-12 lg:col-span-6 flex flex-col gap-4">
                <div class="flex items-center justify-between">
                    <div class="font-semibold text-lg text-surface-900 dark:text-surface-0">Match History</div>
                </div>

                <div class="p-6 rounded-2xl border border-dashed border-surface-200 dark:border-surface-700 bg-surface-50/30 dark:bg-surface-900/10">
                    <p class="text-sm text-surface-400 dark:text-surface-500 m-0 italic">No matches recorded this week.</p>
                </div>
            </div>

            <div class="col-span-12 lg:col-span-6 flex flex-col gap-4">
                <div class="flex items-center justify-between">
                    <div class="font-semibold text-lg text-surface-900 dark:text-surface-0">Tournaments</div>
                </div>

                <div class="p-6 rounded-2xl border border-dashed border-surface-200 dark:border-surface-700 bg-surface-50/30 dark:bg-surface-900/10">
                    <p class="text-sm text-surface-400 dark:text-surface-500 m-0 italic">No tournament registrations found.</p>
                </div>
            </div>

        </div>
    </div>
</div>
