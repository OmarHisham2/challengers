<div class="card">
    <div class="font-semibold text-xl mb-4">Players Directory</div>

    <p-table
        #dt
        [value]="players()"
        dataKey="id"
        [rows]="10"
        [loading]="isLoading()"
        [rowHover]="true"
        [paginator]="true"
        [globalFilterFields]="['name', 'nationality', 'status']"
        responsiveLayout="scroll"
    >
        <ng-template #caption>
            <div class="flex justify-between items-center flex-column sm:flex-row">
                <button pButton label="Clear Filters" class="p-button-outlined mb-2" icon="pi pi-filter-slash" (click)="clear(dt)"></button>
                <p-iconfield iconPosition="left" class="ml-auto">
                    <p-inputicon>
                        <i class="pi pi-search"></i>
                    </p-inputicon>
                    <input #filter pInputText type="text" (input)="onGlobalFilter(dt, $event)" placeholder="Search players..." />
                </p-iconfield>
            </div>
        </ng-template>

        <ng-template #header>
            <tr>
                <th style="min-width: 14rem">
                    <div class="flex justify-between items-center">
                        Name
                        <p-columnFilter type="text" field="name" display="menu" placeholder="Search by name"></p-columnFilter>
                    </div>
                </th>
                <th style="min-width: 12rem">
                    <div class="flex justify-between items-center">
                        Nationality
                        <p-columnFilter type="text" field="nationality" display="menu" placeholder="Search by country"></p-columnFilter>
                    </div>
                </th>
                <th style="min-width: 10rem">
                    <div class="flex justify-between items-center">
                        Status
                        <p-columnFilter type="text" field="status" display="menu" placeholder="Search by status"></p-columnFilter>
                    </div>
                </th>
                <th style="min-width: 8rem">Wins</th>
                <th style="min-width: 8rem">Losses</th>
            </tr>
        </ng-template>

        <ng-template #body let-player>
            <tr (click)="onPlayerClick(player.id)" >
                <td class="font-bold">
                    {{ player.name }}
                </td>
                <td>
                    <div class="flex items-center gap-2">
                        <span>{{ player.nationality }}</span>
                    </div>
                </td>
                <td>
                    <p-tag [value]="player.status"  />
                </td>
                <td>
                    {{ player.wins }}
                </td>
                <td>
                    {{ player.losses }}
                </td>
            </tr>
        </ng-template>

        <ng-template #emptymessage>
            <tr>
                <td colspan="5">No players found.</td>
            </tr>
        </ng-template>
    </p-table>
</div>
