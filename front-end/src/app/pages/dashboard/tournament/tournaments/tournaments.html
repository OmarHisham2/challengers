<div class="card">
    <p-data-view #dv [value]="tournaments()" [rows]="5" [paginator]="true">
        @if (tournaments().length === 0 )
        {
            <p>No Tournaments found</p>
        }
        @else {
        <ng-template #list let-items>
            <div class="grid grid-cols-12 gap-4 grid-nogutter">
                @for (tournament of tournaments(); track tournament._id)
                {
                <div class="col-span-12">
                    <div class="flex flex-col sm:flex-row sm:items-center p-6 gap-4">
                        <div class="md:w-40 relative">
                            <p-tag [value]="tournament.max_players.toString()"  class="absolute dark:!bg-surface-900" [style.left.px]="4" [style.top.px]="4" />
                        </div>
                        <div class="flex flex-col md:flex-row justify-between md:items-center flex-1 gap-6">
                            <div class="flex flex-row md:flex-col justify-between items-start gap-2">
                                <div>
                                    <span class="font-medium text-secondary text-sm">{{ tournament.format }}</span>
                                    <div class="text-lg font-medium text-surface-900 dark:text-surface-0 mt-2">{{ tournament.name }}</div>
                                </div>
                                <div class="bg-surface-100 dark:bg-surface-700 p-1" style="border-radius: 30px">
                                    <div
                                        class="bg-surface-0 dark:bg-surface-900 flex items-center gap-2 justify-center py-1 px-2"
                                        style="border-radius: 30px; box-shadow: 0px 1px 2px 0px rgba(0, 0, 0, 0.04), 0px 1px 2px 0px rgba(0, 0, 0, 0.06)"
                                    >
                                        <span class="text-surface-900 dark:text-surface-0 font-medium text-sm">{{ tournament.location }}</span>
                                        <i class="pi pi-star-fill text-yellow-500"></i>
                                    </div>
                                </div>
                            </div>
                            <div class="flex flex-col md:items-end gap-8">
                                <span class="text-xl font-semibold text-surface-900 dark:text-surface-0">{{ '$' + tournament.registration_deadline }}</span>
                                <div class="flex flex-row-reverse md:flex-row gap-2">
                                    <p-button icon="pi pi-trash" [outlined]="true" />
                                    <p-button icon="pi pi-shopping-cart" class="flex-auto md:flex-initial whitespace-nowrap" label="Buy Now"  />
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
                }
            </div>
        </ng-template>
        }
    </p-data-view>
</div>
